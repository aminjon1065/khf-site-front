<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/industry-43190629-3e7b-45a2-b26c-20bf0ce47f77/styles.css">
  <script src="_ds/industry-43190629-3e7b-45a2-b26c-20bf0ce47f77/_ds_bundle.js"></script>
</helmet>
<div style="min-height:100vh;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body)">
<dc-import name="Header" active="documents" hint-size="100%,220px"></dc-import>
<main style="max-width:1160px;margin:0 auto;padding:32px 24px 0">
  <div style="display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--color-divider);padding-bottom:14px">
    <h1 style="margin:0;font-size:36px;text-transform:uppercase;letter-spacing:.02em">Документы</h1>
    <span style="font-size:12px;color:color-mix(in srgb,var(--color-text) 50%,transparent)">Нормативные акты, отчёты и памятки</span>
  </div>

  <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:16px 0;border-bottom:1px solid var(--color-divider)">
    <div role="group" aria-label="Тип документа" style="display:flex;gap:6px;flex-wrap:wrap">
      <sc-for list="{{ types }}" as="ty" hint-placeholder-count="5">
        <button onClick="{{ ty.select }}" aria-pressed="{{ ty.pressed }}" class="btn" style="font-size:13px;padding:6px 14px;border:1px solid var(--color-divider);background:{{ ty.bg }};color:{{ ty.fg }}" style-hover="border-color:var(--color-accent)">{{ ty.label }}</button>
      </sc-for>
    </div>
    <span style="flex:1"></span>
    <input class="input" type="search" placeholder="Название или номер документа" aria-label="Поиск документов" style="width:260px;min-height:34px;font-size:13px" onInput="{{ onSearch }}">
  </div>

  <sc-if value="{{ hasResults }}" hint-placeholder-val="{{ true }}">
    <table class="table" style="margin-top:8px">
      <thead>
        <tr><th style="width:120px">Тип</th><th>Название</th><th style="width:110px">Номер</th><th style="width:110px">Дата</th><th style="width:80px">Язык</th><th style="width:110px">Файл</th></tr>
      </thead>
      <tbody>
        <sc-for list="{{ docs }}" as="d" hint-placeholder-count="8">
          <tr>
            <td><span class="tag tag-neutral">{{ d.type }}</span></td>
            <td style="font-size:14px;line-height:1.4">{{ d.title }}</td>
            <td style="font-size:13px;color:color-mix(in srgb,var(--color-text) 60%,transparent)">{{ d.number }}</td>
            <td style="font-size:13px;color:color-mix(in srgb,var(--color-text) 60%,transparent)">{{ d.date }}</td>
            <td style="font-size:13px;color:color-mix(in srgb,var(--color-text) 60%,transparent)">{{ d.lang }}</td>
            <td><a href="#" class="btn btn-ghost" style="font-size:12.5px" aria-label="Скачать документ">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15V3M7 10l5 5 5-5"></path><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path></svg>
              {{ d.size }}</a></td>
          </tr>
        </sc-for>
      </tbody>
    </table>
  </sc-if>
  <sc-if value="{{ noResults }}" hint-placeholder-val="{{ false }}">
    <div style="padding:64px 24px;text-align:center">
      <p style="font-family:var(--font-heading);font-weight:600;font-size:19px;margin:0 0 6px">Документы не найдены</p>
      <p style="font-size:13.5px;margin:0 0 16px;color:color-mix(in srgb,var(--color-text) 60%,transparent)">Уточните запрос или выберите другой тип документа.</p>
      <button class="btn btn-secondary" onClick="{{ reset }}">Сбросить фильтры</button>
    </div>
  </sc-if>
</main>
<dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { type: 'Все', q: '' };
  docs = [
    { type: 'Закон', title: 'Закон РТ «О защите населения и территорий от чрезвычайных ситуаций природного и техногенного характера»', number: '№ 1230', date: '02.01.2020', lang: 'ТҶ / РУ', size: 'PDF · 0,4 МБ' },
    { type: 'Закон', title: 'Закон РТ «О гражданской обороне»', number: '№ 1097', date: '28.06.2011', lang: 'ТҶ / РУ', size: 'PDF · 0,3 МБ' },
    { type: 'Постановление', title: 'Национальная стратегия снижения риска бедствий на 2026–2030 годы', number: '№ 218', date: '15.04.2026', lang: 'ТҶ / РУ / EN', size: 'PDF · 2,1 МБ' },
    { type: 'Постановление', title: 'Положение о единой государственной системе предупреждения и ликвидации ЧС', number: '№ 531', date: '03.11.2018', lang: 'ТҶ / РУ', size: 'PDF · 0,7 МБ' },
    { type: 'Отчёт', title: 'Отчёт о деятельности Комитета за первое полугодие 2026 года', number: '—', date: '10.07.2026', lang: 'ТҶ / РУ', size: 'PDF · 1,3 МБ' },
    { type: 'Отчёт', title: 'Анализ чрезвычайных ситуаций на территории республики за 2025 год', number: '—', date: '25.02.2026', lang: 'ТҶ / РУ / EN', size: 'PDF · 3,4 МБ' },
    { type: 'Памятка', title: 'Памятка населению «Действия при землетрясении»', number: 'ИН-01', date: '12.05.2026', lang: 'ТҶ / РУ', size: 'PDF · 0,8 МБ' },
    { type: 'Памятка', title: 'Памятка «Селевая и паводковая опасность»', number: 'ИН-02', date: '12.05.2026', lang: 'ТҶ / РУ', size: 'PDF · 0,9 МБ' },
    { type: 'Приказ', title: 'Приказ об организации месячника гражданской обороны', number: '№ 87', date: '15.07.2026', lang: 'ТҶ', size: 'PDF · 0,2 МБ' },
  ];
  renderVals() {
    const typeList = ['Все', 'Закон', 'Постановление', 'Приказ', 'Отчёт', 'Памятка'];
    const { type, q } = this.state;
    const docs = this.docs.filter((d) =>
      (type === 'Все' || d.type === type) &&
      (!q || (d.title + ' ' + d.number).toLowerCase().includes(q.toLowerCase())));
    return {
      types: typeList.map((c) => ({
        label: c,
        pressed: c === type ? 'true' : 'false',
        bg: c === type ? 'var(--color-accent)' : 'transparent',
        fg: c === type ? 'var(--color-bg)' : 'var(--color-text)',
        select: () => this.setState({ type: c }),
      })),
      onSearch: (e) => this.setState({ q: e.target.value }),
      docs, hasResults: docs.length > 0, noResults: docs.length === 0,
      reset: () => this.setState({ type: 'Все', q: '' }),
    };
  }
}
</script>
</body>
</html>
